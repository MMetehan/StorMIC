name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${{ github.ref_name }}" --pretty=format:'- %s' > /tmp/release_notes.txt
          else
            git log --pretty=format:'- %s' > /tmp/release_notes.txt
          fi
          gh release create "${{ github.ref_name }}" \
            --title "StorMIC ${{ github.ref_name }}" \
            --notes-file /tmp/release_notes.txt

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npm run build:mac
          - os: windows-latest
            build: npm run build:win
          - os: ubuntu-latest
            build: npm run build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & upload to release
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
